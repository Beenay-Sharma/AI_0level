<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: #2a2a3a;
      --accent: #7c6aff;
      --accent2: #ff6a9a;
      --text: #e8e8f0;
      --text-dim: #7070a0;
      --user-bubble: #1e1a3a;
      --bot-bubble: #131320;
      --glow: rgba(124, 106, 255, 0.15);
    }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(124,106,255,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 80%, rgba(255,106,154,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .chat-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 720px;
      height: 90vh;
      max-height: 820px;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(124,106,255,0.1),
        0 40px 80px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.05);
    }

    /* header */
    .chat-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      background: linear-gradient(135deg, var(--surface2) 0%, var(--surface) 100%);
      flex-shrink: 0;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      box-shadow: 0 0 20px var(--glow);
    }

    .header-info h1 {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px #4ade80;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .model-badge {
      margin-left: auto;
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'DM Mono', monospace;
    }

    /* messages area */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* welcome message */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      animation: fadeUp 0.6s ease forwards;
    }

    .welcome-icon {
      font-size: 40px;
      margin-bottom: 16px;
      display: block;
    }

    .welcome h2 {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .welcome p {
      color: var(--text-dim);
      font-size: 13px;
      line-height: 1.6;
    }

    /* message bubbles */
    .message {
      display: flex;
      gap: 10px;
      animation: fadeUp 0.3s ease forwards;
      max-width: 88%;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message.bot {
      align-self: flex-start;
    }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message.user .msg-avatar {
      background: linear-gradient(135deg, #2a2a4a, #3a2a5a);
      border: 1px solid rgba(124,106,255,0.3);
    }

    .message.bot .msg-avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 0 12px var(--glow);
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 13.5px;
      line-height: 1.65;
      max-width: 100%;
      word-break: break-word;
    }

    .message.user .bubble {
      background: var(--user-bubble);
      border: 1px solid rgba(124,106,255,0.2);
      border-bottom-right-radius: 4px;
      color: var(--text);
    }

    .message.bot .bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    /* typing indicator */
    .typing-indicator {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 14px 16px;
    }

    .typing-indicator span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* input area */
    .input-area {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface2);
      flex-shrink: 0;
    }

    .input-wrapper {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13.5px;
      resize: none;
      max-height: 120px;
      min-height: 22px;
      line-height: 1.5;
      caret-color: var(--accent);
    }

    textarea::placeholder { color: var(--text-dim); }

    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 4px 12px var(--glow);
    }

    .send-btn:hover { opacity: 0.85; transform: scale(1.05); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    .send-btn svg {
      width: 16px;
      height: 16px;
      fill: white;
    }

    .footer-note {
      text-align: center;
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 10px;
      opacity: 0.6;
    }

    /* error bubble */
    .error-bubble {
      background: rgba(255, 80, 80, 0.1) !important;
      border-color: rgba(255, 80, 80, 0.3) !important;
      color: #ff8080 !important;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="avatar">⚡</div>
      <div class="header-info">
        <h1>AI Assistant</h1>
        <div class="status">
          <div class="status-dot"></div>
          <span>online</span>
        </div>
      </div>
      <div class="model-badge">llama-3.1-8b</div>
    </div>

    <div class="messages" id="messages">
      <div class="welcome">
        <span class="welcome-icon">🤖</span>
        <h2>Hey, I'm your AI assistant</h2>
        <p>Ask me anything. I'm powered by Llama 3.1<br/>running on Groq's lightning-fast servers.</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          id="userInput"
          placeholder="Ask me anything..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
      <div class="footer-note">Press Enter to send · Shift+Enter for new line</div>
    </div>
  </div>

  <script>
    // ← change this to your backend URL
    const BACKEND_URL = 'http://localhost:8000/chat';

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addMessage(text, role, isError = false) {
      // remove welcome screen on first message
      const welcome = messagesEl.querySelector('.welcome');
      if (welcome) welcome.remove();

      const msg = document.createElement('div');
      msg.className = `message ${role}`;

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = role === 'user' ? '👤' : '⚡';

      const bubble = document.createElement('div');
      bubble.className = `bubble ${isError ? 'error-bubble' : ''}`;
      bubble.textContent = text;

      msg.appendChild(avatar);
      msg.appendChild(bubble);
      messagesEl.appendChild(msg);
      scrollToBottom();
      return bubble;
    }

    function showTyping() {
      const welcome = messagesEl.querySelector('.welcome');
      if (welcome) welcome.remove();

      const msg = document.createElement('div');
      msg.className = 'message bot';
      msg.id = 'typing';

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = '⚡';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = `
        <div class="typing-indicator">
          <span></span><span></span><span></span>
        </div>`;

      msg.appendChild(avatar);
      msg.appendChild(bubble);
      messagesEl.appendChild(msg);
      scrollToBottom();
    }

    function removeTyping() {
      const typing = document.getElementById('typing');
      if (typing) typing.remove();
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      // reset input
      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;

      // show user message
      addMessage(text, 'user');

      // show typing
      showTyping();

      try {
        const res = await fetch(BACKEND_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });

        const data = await res.json();
        removeTyping();

        if (data.reply) {
          addMessage(data.reply, 'bot');
        } else {
          addMessage('Something went wrong. Please try again.', 'bot', true);
        }
      } catch (err) {
        removeTyping();
        addMessage(`Connection error: make sure your backend is running at ${BACKEND_URL}`, 'bot', true);
      }

      sendBtn.disabled = false;
      inputEl.focus();
    }
  </script>
</body>
</html>
